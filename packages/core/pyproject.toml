[project]
name = "tcg-core"
version = "0.1.0"
description = "Dominio compartido e interfaz de proveedores de precios para TCG Price Intelligence"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
]

[project.optional-dependencies]
dev = ["ruff>=0.4", "pytest>=8.0"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"
