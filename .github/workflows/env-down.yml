name: env-down

# Apaga el entorno caro: terraform apply -var enabled=false DESTRUYE el ALB,
# target group, listener y el servicio ECS → sin ALB, sin IPv4 público, sin
# cómputo Fargate. Aurora se auto-pausa (solo storage). BD, S3, SSM, ECR y
# CloudFront NO se tocan. Declarativo e idempotente: si un cron se salta, el
# siguiente reconcilia.

on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC ≈ 23:00 GMT-5 (ajústalo)
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: env-onoff
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  NAME: ${{ vars.TF_NAME || 'tcg-dev' }}

jobs:
  down:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}"

      - name: Apagar (enabled=false)
        run: |
          set -euo pipefail
          export AWS_PAGER=""
          IMG=$(aws ecr describe-images --repository-name "${NAME}-app" \
            --query 'sort_by(imageDetails,&imagePushedAt)[-1].imageTags[0]' --output text)
          terraform apply -input=false -auto-approve -var="enabled=false" -var="image_tag=$IMG"
          echo "Entorno apagado: ALB, IPv4 y Fargate destruidos. Aurora pausada."
