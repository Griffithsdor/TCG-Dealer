name: env-up

# Enciende el entorno: terraform apply -var enabled=true recrea ALB + target
# group + listener + servicio ECS, y repunta CloudFront al ALB nuevo. La API
# queda arriba (CloudFront propaga ~10-15 min tras recrear el ALB).

on:
  schedule:
    - cron: "0 12 * * *" # 12:00 UTC ≈ 07:00 GMT-5 (ajústalo)
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: env-onoff
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  NAME: ${{ vars.TF_NAME || 'tcg-dev' }}

jobs:
  up:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}"

      - name: Encender (enabled=true)
        run: |
          set -euo pipefail
          export AWS_PAGER=""
          IMG=$(aws ecr describe-images --repository-name "${NAME}-app" \
            --query 'sort_by(imageDetails,&imagePushedAt)[-1].imageTags[0]' --output text)
          terraform apply -input=false -auto-approve -var="enabled=true" -var="image_tag=$IMG"
          echo "Entorno encendido."
          terraform output -raw api_url || true
